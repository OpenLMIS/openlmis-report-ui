name: SonarCloud OpenLMIS-report-ui Pipeline
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarcloud:
    name: SonarCloud Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Generate unit-test coverage
        run: |
          touch .env
          docker compose run --rm --entrypoint /dev-ui/build.sh report-ui
      - name: Normalize lcov source paths
        run: |
          sudo chown -R "$(id -u):$(id -g)" build
          mkdir -p build/sonar
          cp build/test/coverage/*/lcov.info build/sonar/lcov.info
          sed -i 's#/app/\.tmp/javascript/src/#src/#g; s#\.tmp/javascript/src/#src/#g' build/sonar/lcov.info
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}